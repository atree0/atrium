app = "atrium-chat"
primary_region = "iad"

[build]

[env]
  PORT = "3000"
  ATRIUM_PUBLIC_URL = "https://atrium-chat.fly.dev"
  ATRIUM_TRUST_PROXY = "true"

[[mounts]]
  source = "atrium_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
