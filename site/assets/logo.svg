<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22262e"/>
      <stop offset="1" stop-color="#0c0e12"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#aeb4bf"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="23" fill="url(#tile)"/>
  <rect x="0.75" y="0.75" width="98.5" height="98.5" rx="22.5" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
  <!-- the light well: descending rings into a bright core -->
  <rect x="20" y="12" width="60" height="60" rx="14" fill="none" stroke="#4b5563" stroke-width="5" opacity="0.6"/>
  <rect x="31" y="27" width="38" height="38" rx="9" fill="none" stroke="#a4acb8" stroke-width="5" opacity="0.9"/>
  <rect x="42" y="42" width="16" height="16" rx="4.5" fill="url(#core)"/>
</svg>
